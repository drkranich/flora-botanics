name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar manualmente na aba Actions

jobs:
  storefront:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # versão do pnpm vem do campo "packageManager" do package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile=false

      - name: Build + Deploy no Cloudflare Workers (OpenNext)
        working-directory: apps/storefront
        run: pnpm exec opennextjs-cloudflare build && pnpm exec opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: https://mbpvzhcrimdwcqkqvoqr.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_TENANT_SLUG: flora-botanics
