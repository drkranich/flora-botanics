name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Build (storefront + admin + packages)
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://mbpvzhcrimdwcqkqvoqr.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

# Deploy para Cloudflare Workers (OpenNext) entra na Fase 1,
# usando CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID já cadastrados.
