<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flora Botanics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --green-dark: #122414;
      --green: #1d321d;
      --green-soft: #263c25;
      --cream: #f3efe4;
      --cream-2: #ebe4d4;
      --gold: #b89348;
      --gold-dark: #98783d;
      --text: #26261f;
      --muted: #706958;
      --white: #fffaf0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Montserrat", sans-serif;
      color: var(--text);
      background: var(--cream);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
    }

    .container {
      width: min(1280px, calc(100% - 80px));
      margin: 0 auto;
    }

    /* =========================
       HEADER / HERO
    ========================= */

    .hero {
      position: relative;
      min-height: 645px;
      color: var(--cream);
      background:
        linear-gradient(
          90deg,
          rgba(8, 17, 9, 0.84) 0%,
          rgba(8, 17, 9, 0.52) 34%,
          rgba(8, 17, 9, 0.22) 62%,
          rgba(8, 17, 9, 0.42) 100%
        ),
        url("assets/hero-floresta.jpg") center / cover no-repeat;
      overflow: hidden;
    }

    .header {
      position: relative;
      z-index: 5;
      height: 104px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      color: #f3ead7;
      min-width: 180px;
    }

    .logo-word {
      font-size: 56px;
      letter-spacing: -4px;
      font-weight: 900;
      line-height: 0.8;
    }

    .logo-o {
      position: relative;
      display: inline-flex;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #f3ead7;
      margin: 0 -2px;
      vertical-align: -4px;
      align-items: center;
      justify-content: center;
    }

    .logo-o::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--green-dark);
      box-shadow:
        0 -10px 0 -6px var(--green-dark),
        0 10px 0 -6px var(--green-dark),
        10px 0 0 -6px var(--green-dark),
        -10px 0 0 -6px var(--green-dark),
        7px 7px 0 -6px var(--green-dark),
        -7px -7px 0 -6px var(--green-dark),
        7px -7px 0 -6px var(--green-dark),
        -7px 7px 0 -6px var(--green-dark);
    }

    .logo-sub {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1.2px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-left: 80px;
    }

    .nav a {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: #f5ecd7;
      opacity: 0.96;
    }

    .nav a:hover {
      color: var(--gold);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .icon-btn {
      width: 21px;
      height: 21px;
      color: #f3ead7;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      background: var(--gold);
      color: #fff7e8;
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 17px 31px;
      transition: 0.25s ease;
    }

    .btn:hover {
      background: var(--gold-dark);
      transform: translateY(-1px);
    }

    .hero-content {
      position: relative;
      z-index: 3;
      padding-top: 78px;
      max-width: 430px;
      margin-left: 74px;
    }

    .hero h1 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: 58px;
      line-height: 0.96;
      letter-spacing: -1.4px;
      color: #f6efe3;
      margin-bottom: 24px;
    }

    .hero p {
      font-size: 19px;
      line-height: 1.38;
      font-weight: 500;
      color: #fff7e9;
      margin-bottom: 28px;
    }

    .hero-products {
      position: absolute;
      z-index: 2;
      right: 74px;
      bottom: 45px;
      width: 710px;
      max-width: 58vw;
      pointer-events: none;
    }

    .hero-products img {
      object-fit: contain;
      filter: drop-shadow(0 24px 40px rgba(0,0,0,0.38));
    }

    /* =========================
       CATEGORIES
    ========================= */

    .section-title {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2.8px;
      color: #27251f;
      text-transform: uppercase;
    }

    .categories {
      background: var(--cream);
      padding: 26px 0 31px;
    }

    .title-line {
      position: relative;
      margin-bottom: 36px;
    }

    .title-line::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -17px;
      transform: translateX(-50%);
      width: 68px;
      height: 1px;
      background: rgba(37, 35, 29, 0.35);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 42px;
      padding-top: 3px;
    }

    .category-card img {
      height: 198px;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .category-card h3 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #4a3828;
    }

    .category-card p {
      font-size: 13px;
      line-height: 1.45;
      color: #3b372e;
      max-width: 240px;
      margin-bottom: 17px;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(38,38,31,0.65);
      padding-bottom: 3px;
    }

    .link::after {
      content: "›";
      font-size: 18px;
      line-height: 1;
      margin-top: -2px;
    }

    /* =========================
       INGREDIENTS
    ========================= */

    .ingredients {
      background: var(--cream-2);
      padding: 45px 0 54px;
    }

    .ingredients-wrap {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 50px;
      align-items: center;
    }

    .ingredients-copy h2 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: 35px;
      line-height: 1.02;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      color: #25251e;
      margin-bottom: 22px;
    }

    .ingredients-copy p {
      font-size: 13px;
      line-height: 1.55;
      color: #37342b;
      margin-bottom: 28px;
    }

    .ingredient-list {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 42px;
      align-items: start;
    }

    .ingredient {
      text-align: center;
    }

    .ingredient img {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 17px;
    }

    .ingredient h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6d4e2e;
      margin-bottom: 7px;
    }

    .ingredient p {
      font-size: 12px;
      line-height: 1.42;
      color: #37342b;
      max-width: 130px;
      margin: 0 auto;
    }

    /* =========================
       MANIFESTO
    ========================= */

    .manifesto {
      position: relative;
      min-height: 315px;
      color: var(--cream);
      background:
        linear-gradient(
          90deg,
          rgba(16, 31, 16, 0.96) 0%,
          rgba(16, 31, 16, 0.86) 31%,
          rgba(16, 31, 16, 0.18) 62%,
          rgba(16, 31, 16, 0.34) 100%
        ),
        url("assets/manifesto-modelo.jpg") center / cover no-repeat;
    }

    .manifesto .container {
      min-height: 315px;
      display: flex;
      align-items: center;
    }

    .manifesto-copy {
      max-width: 520px;
    }

    .eyebrow {
      position: relative;
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 26px;
    }

    .eyebrow::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -12px;
      width: 68px;
      height: 1px;
      background: var(--gold);
    }

    .manifesto h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 43px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.6px;
      color: #f4ead7;
      margin-bottom: 18px;
    }

    .manifesto p {
      font-size: 13px;
      line-height: 1.55;
      color: #f8efdf;
      max-width: 410px;
      margin-bottom: 23px;
    }

    .manifesto .link {
      color: #f4ead7;
      border-bottom-color: rgba(244,234,215,0.75);
    }

    /* =========================
       BENEFITS
    ========================= */

    .benefits {
      background: var(--cream);
      padding: 26px 0 30px;
      border-bottom: 1px solid rgba(49,43,31,0.15);
    }

    .benefit-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 32px;
    }

    .benefit {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 18px;
      align-items: start;
    }

    .benefit svg {
      width: 42px;
      height: 42px;
      color: var(--gold-dark);
      stroke-width: 1.4;
    }

    .benefit h3 {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #6e5636;
      margin-bottom: 8px;
    }

    .benefit p {
      font-size: 12px;
      line-height: 1.42;
      color: #453f34;
    }

    /* =========================
       NEWSLETTER
    ========================= */

    .newsletter {
      position: relative;
      color: var(--cream);
      background:
        linear-gradient(
          90deg,
          rgba(14, 31, 17, 0.96) 0%,
          rgba(14, 31, 17, 0.9) 45%,
          rgba(14, 31, 17, 0.46) 68%,
          rgba(14, 31, 17, 0.24) 100%
        ),
        url("assets/newsletter-contagotas.jpg") right center / cover no-repeat;
      padding: 43px 0 48px;
    }

    .newsletter-grid {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 95px;
      align-items: center;
    }

    .newsletter h2 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: 39px;
      line-height: 1.04;
      letter-spacing: -0.4px;
      color: #f4ead7;
      margin-bottom: 20px;
    }

      font-size: 13px;
      line-height:
